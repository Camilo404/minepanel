services:
  backend:
    image: minepanel-backend:local
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Optional features (SMTP password recovery, OIDC/SSO, ...) are read from .env.
    # See .env.example and doc/sso.md for the full list.
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET} # Required. Generate with: openssl rand -base64 32
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2d}
      - ALLOW_INSECURE_AUTH_COOKIES=${ALLOW_INSECURE_AUTH_COOKIES:-false}
      - BASE_DIR=${BASE_DIR:-$PWD}
      - COMPOSE_PROJECT=${COMPOSE_PROJECT:-}
      - BASE_PATH=${BASE_PATH:-}
    volumes:
      - ${BASE_DIR:-$PWD}/servers:/app/servers
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BASE_DIR:-$PWD}/data:/app/data
    networks:
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.minepanel-backend.rule=Host(`api-minepanel.camilo404.dev`)"
      - "traefik.http.routers.minepanel-backend.entrypoints=websecure"
      - "traefik.http.routers.minepanel-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.minepanel-backend.loadbalancer.server.port=8091"

  frontend:
    image: minepanel-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PORT=3003
        # Subdirectory routing (build-time): uncomment and set path
        # - NEXT_PUBLIC_BASE_PATH=/minepanel
    environment:
      - PORT=3003
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8091}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
      - NEXT_PUBLIC_DEFAULT_LANGUAGE=${NEXT_PUBLIC_DEFAULT_LANGUAGE:-en}
    depends_on:
      - backend
    networks:
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.minepanel-frontend.rule=Host(`minepanel.camilo404.dev`)"
      - "traefik.http.routers.minepanel-frontend.entrypoints=websecure"
      - "traefik.http.routers.minepanel-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.minepanel-frontend.loadbalancer.server.port=3003"

  # MC Proxy Router - Routes Minecraft Java traffic by hostname (optional)
  # Note: mc-router is TCP (not HTTP), so Traefik does NOT route it.
  # It binds 25565 directly on the host so Minecraft Java clients can reach it.
  # Setup a separate DNS wildcard: *.mc.camilo404.dev -> your VPS IP.
  # Bedrock uses UDP and cannot use this proxy; each Bedrock server needs its own port.
  # Enable with: docker compose --profile proxy up -d
  mc-router:
    image: itzg/mc-router:1.39.1
    container_name: mc-router
    profiles:
      - proxy
    ports:
      - '${MC_PROXY_PORT:-25565}:25565'
    environment:
      - ROUTES_CONFIG=/data/routes.json
      - ROUTES_CONFIG_WATCH=true
    volumes:
      - ${BASE_DIR:-$PWD}/data/proxy:/data
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    name: dokploy-network
    external: true
